services:
  - type: web
    name: affiliate-stock-prototype
    runtime: node
    plan: starter
    buildCommand: npm install && npx next build --webpack
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PRODUCTS_DATA_FILE
        value: /var/data/products.json
    disk:
      name: products-data
      mountPath: /var/data
      sizeGB: 1
